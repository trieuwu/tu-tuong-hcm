<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trắc Nghiệm Pháp Luật Đại Cương</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── HOME ── -->
<div id="home" class="screen active">
  <div class="brand">
    <div class="brand-eyebrow">Trắc Nghiệm PTIT</div>
    <h1>Pháp Luật<br><em>Đại Cương</em></h1>
    <div class="brand-sub">Ngân hàng câu hỏi · Năm 2024 <span class="brand-count">430 CÂU</span></div>
  </div>

  <div class="card">
    <div class="section-label">Chế độ</div>
    <div class="mode-tabs" style="margin-bottom:20px">
      <button class="mode-tab active" data-mode="seq">📋 Theo thứ tự</button>
      <button class="mode-tab" data-mode="rand">🎲 Ngẫu nhiên</button>
    </div>

    <div class="section-label">Số câu</div>
    <div class="btn-group" style="margin-bottom:20px">
      <button class="count-btn active" data-count="20">20</button>
      <button class="count-btn" data-count="50">50</button>
      <button class="count-btn" data-count="100">100</button>
      <button class="count-btn" data-count="430">Tất cả</button>
    </div>

    <div class="range-row" id="range-row">
      <div class="section-label">Phạm vi câu hỏi</div>
      <div class="styled-select">
        <select id="range-sel"></select>
      </div>
    </div>

    <div class="toggle-group">
      <div class="toggle-row">
        <div>
          <div class="toggle-title">Xáo thứ tự câu hỏi</div>
          <div class="toggle-desc">Ngẫu nhiên hóa vị trí các câu</div>
        </div>
        <label class="toggle-sw">
          <input type="checkbox" id="shuf-q">
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="toggle-row">
        <div>
          <div class="toggle-title">Xáo thứ tự đáp án</div>
          <div class="toggle-desc">Ngẫu nhiên hóa vị trí A, B, C, D</div>
        </div>
        <label class="toggle-sw">
          <input type="checkbox" id="shuf-a">
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>
  </div>

  <button class="start-btn" id="btn-start">Bắt Đầu</button>
</div>

<!-- ── QUIZ ── -->
<div id="quiz" class="screen">
  <div class="quiz-header">
    <div class="quiz-topbar">
      <div style="display:flex;align-items:center;gap:18px">
        <button class="back-link" id="btn-back">← Trang chủ</button>
        <div class="quiz-counter">Câu <strong id="qc-cur">1</strong> / <strong id="qc-tot">20</strong></div>
      </div>
      <div class="quiz-scores">
        <span class="s-ok">✓ <span id="sc-ok">0</span></span>
        <span class="s-bad">✗ <span id="sc-bad">0</span></span>
      </div>
    </div>
    <div class="pbar"><div class="pbar-fill" id="pbar"></div></div>
  </div>

  <div class="q-card">
    <div class="q-text" id="q-text"></div>
  </div>

  <div class="options" id="options"></div>

  <button class="next-btn" id="btn-next">Câu tiếp theo →</button>
</div>

<!-- ── RESULT / SUMMARY ── -->
<div id="result" class="screen">
  <div class="sum-outer">
    <div class="sum-score-block">
      <div class="sum-toprow">
        <div class="sum-title-wrap">
          <span class="sum-emoji" id="res-emoji"></span>
          <div class="sum-title" id="res-title"></div>
          <div class="sum-desc" id="res-desc"></div>
        </div>
        <div class="sum-actions">
          <button class="r-btn ghost" id="btn-home2">← Trang chủ</button>
          <button class="r-btn primary" id="btn-retry">Làm lại</button>
        </div>
      </div>
      <div class="stats-strip">
        <div class="stat-chip">
          <div class="num ok" id="res-ok">0</div>
          <div class="lbl">Câu đúng</div>
        </div>
        <div class="stat-chip">
          <div class="num bad" id="res-bad">0</div>
          <div class="lbl">Câu sai</div>
        </div>
        <div class="stat-chip">
          <div class="num pct" id="res-pct">0%</div>
          <div class="lbl">Tỉ lệ đúng</div>
        </div>
      </div>
    </div>

    <div class="review-header-bar">
      <span class="rh-title">Chi tiết câu trả lời</span>
      <span class="rh-counts" id="rh-counts"></span>
    </div>

    <div class="filter-tabs">
      <button class="f-tab active" data-filter="all">Tất cả</button>
      <button class="f-tab" data-filter="ok">Đúng</button>
      <button class="f-tab" data-filter="bad">Sai</button>
    </div>

    <div class="review-list" id="review-list"></div>
  </div>
</div>

<button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">
  <span class="tog-track">
    <span class="tog-knob"></span>
    <svg class="tog-icon tog-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <svg class="tog-icon tog-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
    </svg>
  </span>
</button>

<footer class="site-footer">
  <span>Made by <a href="https://github.com/hoanghero125" target="_blank" rel="noopener"><strong>DekTheDev</strong></a></span>
</footer>

<script src="questions.js"></script>
<script src="script.js"></script>
</body>
</html>
